<body class="bg-background text-on-surface antialiased min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar Component -->
<header class="w-full top-0 sticky bg-surface dark:bg-surface border-b flex items-center justify-between px-margin-mobile h-16 max-w-container-max mx-auto z-40 border-outline-variant"><div class="flex items-center gap-3 text-primary dark:text-primary"><button class="flex items-center justify-center"><span class="material-symbols-outlined">arrow_back</span></button></div><div class="font-headline-md text-headline-md tracking-tight text-primary">Sleep Quality</div><button class="flex items-center justify-center w-8 text-primary">
    <span class="material-symbols-outlined">close</span>
</button></header>
<!-- Main Content Canvas -->
<main class="flex-grow w-full max-w-2xl mx-auto px-margin-mobile pb-32 flex flex-col gap-gutter-md md:gap-8 pt-4">
    <!-- Header Section -->
    <section class="flex flex-col gap-unit"><div class="text-center py-2">
        <span class="text-on-surface-variant font-label-sm">Mon, 12:15 AM</span>
    </div></section>
    <!-- Form Section -->
    <form class="flex flex-col gap-gutter-md md:gap-8">
        <!-- Metrics Container -->
        <div class="flex flex-col gap-3">
            <!-- Duration Tile -->
            <div class="bg-surface-container-low rounded-xl border border-outline-variant p-4 flex flex-col gap-2 glow-input group">
                <label class="text-primary font-semibold" for="duration">Duration (hrs)</label>
                <div class="relative flex items-center">
                    <input class="w-full bg-surface-container-lowest border-outline-variant/40 border text-on-surface font-body-lg text-body-lg rounded-lg px-4 py-3 focus:border-primary focus:ring-0 transition-all placeholder:text-outline" id="duration" placeholder="7.5" step="0.1" type="number" value="7.2"/>
                </div>
            </div>
            <!-- Quality Tile -->
            <div class="bg-surface-container-low rounded-xl border border-outline-variant p-4 flex flex-col gap-2 glow-input group">
                <label class="text-primary font-semibold" for="quality">Quality (%)</label>
                <div class="relative flex items-center">
                    <input class="w-full bg-surface-container-lowest border-outline-variant/40 border text-on-surface font-body-lg text-body-lg rounded-lg px-4 py-3 focus:border-primary focus:ring-0 transition-all placeholder:text-outline" id="quality" placeholder="85" type="number" value="85"/>
                </div>
            </div>
            <!-- Start Time Tile -->
        </div>
        <!-- Context Tags Section -->
        <!-- Notes Section -->
        <div class="flex flex-col gap-unit glow-input group gap-3">
        </div>
    </form>
</main>
<!-- Signal Action Footer -->
<div class="fixed bottom-0 left-0 w-full bg-surface/80 backdrop-blur-md border-t border-outline-variant/20 p-margin-mobile z-50">
    <div class="max-w-2xl mx-auto flex justify-end">
        <button class="w-full md:w-auto px-8 py-3 bg-primary-container text-on-primary-fixed-variant font-label-md rounded-full hover:brightness-95 active:scale-95 transition-all shadow-sm flex items-center justify-center gap-2">
            <span class="">Save Record</span>
            <span class="material-symbols-outlined text-[20px]">check</span>
        </button>
    </div>
</div>
<!-- Background Atmospheric Effect -->
<div class="fixed inset-0 pointer-events-none z-[-1] opacity-[0.03]" style="background-image: radial-gradient(circle at 50% 0%, theme('colors.primary-container') 0%, transparent 50%);"></div>
