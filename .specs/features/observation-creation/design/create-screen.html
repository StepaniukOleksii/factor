<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col antialiased">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-surface border-b border-outline-variant z-40 transition-colors">
<div class="flex items-center justify-between px-margin-mobile h-16 w-full max-w-screen-xl mx-auto">
<button aria-label="Go back" class="flex items-center justify-center p-2 rounded-full text-on-surface hover:bg-surface-container-low active:scale-95 duration-150 ease-in-out transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-surface tracking-tight">New Observation</h1>
<button aria-label="More options" class="flex items-center justify-center p-2 rounded-full text-on-surface hover:bg-surface-container-low active:scale-95 duration-150 ease-in-out transition-colors">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<!-- Task-Focused Screen: Navigation Shell Suppressed -->
<main class="flex-grow w-full max-w-2xl mx-auto px-margin-mobile py-lg pb-2xl mb-2xl">
<!-- Form Section -->
<section class="flex flex-col gap-lg">
<!-- Observation Name -->
<div class="flex flex-col gap-sm">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest" for="observation-name">Observation Name</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 font-body-md text-on-surface placeholder:text-outline focus:border-primary focus:ring-0 transition-colors shadow-sm outline-none" id="observation-name" placeholder="e.g., Sleep Quality, Mood" type="text">
</div>
<hr class="border-t border-outline-variant w-full my-md">
<!-- Metrics Section -->
<div class="flex flex-col gap-md" id="metrics-container">
<div class="flex items-center justify-between">
<h2 class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Metrics</h2>

</div>
<!-- Metrics List -->
<div class="flex flex-col gap-sm" id="metrics-list">
<!-- Metric Row 1 -->
<div class="metric-row flex items-start gap-sm bg-surface-container-low border border-outline-variant rounded-lg p-md transition-all">
<div class="flex-grow grid grid-cols-1 md:grid-cols-2 gap-sm">
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-outline uppercase">Metric Name</label>
<input class="w-full bg-surface-container-lowest border border-transparent rounded px-3 py-2 font-body-md text-on-surface focus:border-outline-variant outline-none transition-colors" placeholder="e.g., Duration" type="text">
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-outline uppercase">Type</label>
<div class="relative">
<select class="w-full appearance-none bg-surface-container-lowest border border-transparent rounded px-3 py-2 font-body-md text-on-surface focus:border-outline-variant outline-none transition-colors pr-8">
<option value="number">Number</option>
<option value="scale">Scale (1-10)</option>
<option value="text">Text Notes</option>
<option value="duration">Duration (mins)</option>
</select>
<span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-outline pointer-events-none text-[20px]">expand_more</span>
</div>
</div>
</div>
<button aria-label="Delete metric" class="delete-metric-btn hidden mt-6 text-outline hover:text-error transition-colors p-1">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
</div>
<!-- Add Metric Action -->

</button>
</div>

<div class="fixed bottom-0 left-0 w-full bg-surface/80 backdrop-blur-md border-t border-outline-variant p-margin-mobile z-50">
<div class="max-w-2xl mx-auto flex justify-end">
<button class="w-full md:w-auto px-8 py-3 bg-primary-container text-on-primary-fixed-variant font-label-md rounded-full hover:brightness-95 active:scale-95 transition-all shadow-sm flex items-center justify-center gap-2">
<span class="">Create Observation</span>
<span class="material-symbols-outlined text-[20px]">check</span>
</button>
</div>

<script>
        document.addEventListener('DOMContentLoaded', () => {
            const metricsList = document.getElementById('metrics-list');
            const addMetricBtn = document.getElementById('add-metric-btn');

            // Template for a new metric row
            const metricTemplate = `
                <div class="metric-row flex items-start gap-sm bg-surface-container-low border border-outline-variant rounded-lg p-md transition-all animate-fade-in">
                    <div class="flex-grow grid grid-cols-1 md:grid-cols-2 gap-sm">
                        <div class="flex flex-col gap-xs">
                            <label class="font-label-sm text-label-sm text-outline uppercase">Metric Name</label>
                            <input type="text" placeholder="e.g., Intensity" class="w-full bg-surface-container-lowest border border-transparent rounded px-3 py-2 font-body-md text-on-surface focus:border-outline-variant outline-none transition-colors">
                        </div>
                        <div class="flex flex-col gap-xs">
                            <label class="font-label-sm text-label-sm text-outline uppercase">Type</label>
                            <div class="relative">
                                <select class="w-full appearance-none bg-surface-container-lowest border border-transparent rounded px-3 py-2 font-body-md text-on-surface focus:border-outline-variant outline-none transition-colors pr-8">
                                    <option value="number">Number</option>
                                    <option value="scale">Scale (1-10)</option>
                                    <option value="text">Text Notes</option>
                                    <option value="duration">Duration (mins)</option>
                                </select>
                                <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-outline pointer-events-none text-[20px]">expand_more</span>
                            </div>
                        </div>
                    </div>
                    <button class="delete-metric-btn mt-6 text-outline hover:text-error transition-colors p-1" aria-label="Delete metric">
                        <span class="material-symbols-outlined text-[20px]">delete</span>
                    </button>
                </div>
            `;

            // Function to update delete button visibility
            const updateDeleteButtons = () => {
                const rows = metricsList.querySelectorAll('.metric-row');
                const deleteBtns = metricsList.querySelectorAll('.delete-metric-btn');

                if (rows.length > 1) {
                    deleteBtns.forEach(btn => btn.classList.remove('hidden'));
                } else {
                    deleteBtns.forEach(btn => btn.classList.add('hidden'));
                }
            };

            // Add new metric
            addMetricBtn.addEventListener('click', () => {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = metricTemplate.trim();
                const newRow = tempDiv.firstChild;

                // Add delete listener to new button
                newRow.querySelector('.delete-metric-btn').addEventListener('click', (e) => {
                    newRow.remove();
                    updateDeleteButtons();
                });

                metricsList.appendChild(newRow);
                updateDeleteButtons();
            });

            // Initial setup for the first row's delete button (if any somehow exist)
            metricsList.querySelectorAll('.delete-metric-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.target.closest('.metric-row').remove();
                    updateDeleteButtons();
                });
            });

            // Run once on load
            updateDeleteButtons();
        });
    </script>
<style>

            to { opacity: 1; transform: translateY(0); }
        }

            animation: fadeIn 0.2s ease-out forwards;
        }
